<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro em Lote</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card">

    <h2>Cadastro de Alunos do 8º Ano</h2>

    <p>Cole uma lista com um aluno por linha:</p>

    <textarea id="listaAlunos" rows="15"
      placeholder="Ana Clara Oliveira
Pedro Henrique Santos
Maria Eduarda Silva"></textarea>

    <button id="btnCadastrar">
      Cadastrar Alunos
    </button>

    <p id="mensagem"></p>

  </div>

</div>

<script type="module" src="cadastro-alunos.js"></script>

</body>
</html>
